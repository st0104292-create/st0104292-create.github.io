<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy 聊天室 - Designed by 陳宗偉</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 700px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #007bff; color: white; display: flex; flex-direction: column; gap: 10px; }
        .config-row { display: flex; gap: 8px; align-items: center; }
        .config-row label { font-size: 14px; min-width: 65px; }
        .header input { flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #ddd; outline: none; }
        button#connBtn { width: 100%; padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #28a745; color: white; font-weight: bold; transition: 0.3s; }
        button#connBtn.connected { background: #6c757d; cursor: not-allowed; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f9f9f9; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 11px; margin-bottom: 4px; opacity: 0.8; }
        .sent .msg-info { text-align: right; }
        .input-area { padding: 15px; background: white; border-top: 1px solid #eee; }
        input#messageInput { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; box-sizing: border-box; }
        .footer { padding: 8px; background: #f8f9fa; text-align: center; font-size: 12px; color: #aaa; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="config-row">
            <label>頻道名稱:</label>
            <input type="text" id="topicInput" value="drher" readonly style="background:#eee;">
        </div>
        <div class="config-row">
            <label>您的名稱:</label>
            <input type="text" id="nameInput" value="何帥" placeholder="輸入您的稱呼">
        </div>
        <button id="connBtn">點此開始連線</button>
    </div>
    
    <div class="messages" id="messageBox"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="請先點擊上方連線..." disabled>
    </div>

    <div class="footer">系統設計者：<strong>陳宗偉</strong></div>
</div>

<script>
    const topicInput = document.getElementById('topicInput');
    const nameInput = document.getElementById('nameInput');
    const connBtn = document.getElementById('connBtn');
    const messageInput = document.getElementById('messageInput');
    const messageBox = document.getElementById('messageBox');
    
    let eventSource = null;

    connBtn.onclick = () => {
        const topic = topicInput.value.trim();
        const user = nameInput.value.trim();
        if (!user) { alert("請輸入您的名稱！"); return; }

        if (eventSource) eventSource.close();
        
        // 1. 建立 SSE 連線接收訊息
        eventSource = new EventSource(`https://ntfy.sh/${topic}/sse`);
        
        eventSource.onopen = () => {
            connBtn.innerText = `連線成功 (頻道: ${topic})`;
            connBtn.classList.add('connected');
            connBtn.disabled = true;
            nameInput.disabled = true;
            messageInput.disabled = false;
            messageInput.focus();
            addSystemMsg(`系統：歡迎 ${user} 進入聊天室。`);
        };

        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.event === "message") {
                const currentMe = nameInput.value.trim();
                // 判斷訊息是誰發的
                const type = (data.title === currentMe) ? 'sent' : 'received';
                appendMessage(data.message, type, data.title || "匿名");
            }
        };

        eventSource.onerror = () => {
            console.log("正在維持連線...");
        };
    };

    // 2. 修復後的發送訊息邏輯
    async function sendMessage() {
        const message = messageInput.value.trim();
        const topic = topicInput.value.trim();
        const userName = nameInput.value.trim();

        if (!message) return;

        // 清空輸入框
        messageInput.value = '';

        try {
            // 改用 JSON 發送，避免 CORS 標頭被丟棄的問題
            await fetch(`https://ntfy.sh`, {
                method: 'POST',
                body: JSON.stringify({
                    topic: topic,
                    message: message,
                    title: userName
                })
            });
        } catch (error) {
            console.error("發送失敗:", error);
            addSystemMsg("系統：發送失敗，請檢查網路連線。");
        }
    }

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(text, type, sender) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `
            <div class="msg-info">${sender} · ${time}</div>
            <div class="text">${text}</div>
        `;
        messageBox.appendChild(div);
        messageBox.scrollTop = messageBox.scrollHeight;
    }

    function addSystemMsg(text) {
        const div = document.createElement('div');
        div.style.cssText = "text-align:center; font-size:12px; color: #999; margin: 10px 0;";
        div.innerText = text;
        messageBox.appendChild(div);
    }
</script>

</body>
</html>
