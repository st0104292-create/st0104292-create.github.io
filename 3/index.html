<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .info-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .score-box, .highscore-box, .level-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .score-box .label, .highscore-box .label, .level-box .label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .score-box .value, .highscore-box .value, .level-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .game-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #gameCanvas {
            border: 3px solid #667eea;
            background: #1a1a2e;
            border-radius: 8px;
            display: block;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1;
        }

        .control-panel {
            margin-bottom: 20px;
        }

        .keyboard-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .mobile-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            align-items: center;
        }

        .btn-control {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn-control:active {
            background: #764ba2;
            transform: scale(0.95);
        }

        .row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-up {
            margin-bottom: 5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #48bb78;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .sound-control {
            text-align: center;
            font-size: 14px;
        }

        .sound-control label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .sound-control input[type="checkbox"] {
            cursor: pointer;
        }

        .game-status {
            text-align: center;
            font-size: 16px;
            color: #667eea;
            font-weight: bold;
            min-height: 20px;
        }

        .designer-info {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
                border-radius: 10px;
            }

            .header h1 {
                font-size: 24px;
            }

            .info-panel {
                gap: 8px;
                margin-bottom: 15px;
            }

            .score-box, .highscore-box, .level-box {
                padding: 10px;
            }

            .score-box .value, .highscore-box .value, .level-box .value {
                font-size: 20px;
            }

            #gameCanvas {
                max-width: 100%;
            }

            .btn-control {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .button-group {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .btn {
                padding: 10px 12px;
                font-size: 12px;
            }

            .keyboard-hint {
                display: none;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 22px;
            }

            .info-panel {
                gap: 6px;
            }

            .btn-control {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .row {
                gap: 6px;
            }

            .button-group {
                gap: 6px;
            }

            .btn {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 貪吃蛇遊戲</h1>
        </div>

        <div class="info-panel">
            <div class="score-box">
                <span class="label">分數：</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="highscore-box">
                <span class="label">最高分：</span>
                <span class="value" id="highscore">0</span>
            </div>
            <div class="level-box">
                <span class="label">等級：</span>
                <span class="value" id="level">1</span>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="control-panel">
            <div class="keyboard-hint">⌨️ 桌面：方向鍵操作</div>
            <div class="mobile-controls">
                <button class="btn-control btn-up" id="btnUp">▲</button>
                <div class="row">
                    <button class="btn-control btn-left" id="btnLeft">◄</button>
                    <button class="btn-control btn-down" id="btnDown">▼</button>
                    <button class="btn-control btn-right" id="btnRight">►</button>
                </div>
            </div>
            <div class="button-group">
                <button id="startBtn" class="btn btn-primary">開始遊戲</button>
                <button id="pauseBtn" class="btn btn-secondary">暫停</button>
                <button id="resetBtn" class="btn btn-danger">重新開始</button>
            </div>
            <div class="sound-control">
                <label>
                    <input type="checkbox" id="soundToggle" checked>
                    🔊 音效
                </label>
            </div>
        </div>

        <div class="game-status" id="gameStatus"></div>
        <div class="designer-info">設計者：陳宗偉</div>
    </div>

    <script>
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        const INITIAL_SPEED = 100;
        const MAX_SPEED = 30;

        let gameState = {
            snake: [{ x: 10, y: 10 }],
            food: { x: 15, y: 15 },
            direction: { x: 1, y: 0 },
            nextDirection: { x: 1, y: 0 },
            score: 0,
            highScore: localStorage.getItem('snakeHighScore') || 0,
            level: 1,
            isRunning: false,
            isPaused: false,
            foodEaten: 0,
            gameSpeed: INITIAL_SPEED
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highscore');
        const levelDisplay = document.getElementById('level');
        const gameStatusDisplay = document.getElementById('gameStatus');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const soundToggle = document.getElementById('soundToggle');

        let touchStartX = 0;
        let touchStartY = 0;

        highScoreDisplay.textContent = gameState.highScore;

        function playSound(type) {
            if (!soundToggle.checked) return;

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'eat') {
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } else if (type === 'gameOver') {
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } else if (type === 'levelUp') {
                for (let i = 0; i < 2; i++) {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = 400 + i * 200;
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.15);
                    osc.start(audioContext.currentTime + i * 0.15);
                    osc.stop(audioContext.currentTime + i * 0.15 + 0.15);
                }
            }
        }

        function generateFood() {
            let newFood;
            let foodOnSnake = true;
            
            while (foodOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                foodOnSnake = gameState.snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            return newFood;
        }

        function updateGame() {
            if (!gameState.isRunning || gameState.isPaused) return;

            gameState.direction = { ...gameState.nextDirection };

            const head = gameState.snake[0];
            const newHead = {
                x: (head.x + gameState.direction.x + GRID_SIZE) % GRID_SIZE,
                y: (head.y + gameState.direction.y + GRID_SIZE) % GRID_SIZE
            };

            if (gameState.snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }

            gameState.snake.unshift(newHead);

            if (newHead.x === gameState.food.x && newHead.y === gameState.food.y) {
                gameState.score += 10;
                gameState.foodEaten++;
                playSound('eat');

                if (gameState.foodEaten % 5 === 0 && gameState.level < 10) {
                    gameState.level++;
                    gameState.gameSpeed = Math.max(MAX_SPEED, INITIAL_SPEED - (gameState.level - 1) * 8);
                    playSound('levelUp');
                    gameStatusDisplay.textContent = `📈 升級到第 ${gameState.level} 級！`;
                    setTimeout(() => { gameStatusDisplay.textContent = ''; }, 2000);
                } else if (gameState.level === 10 && gameState.foodEaten % 10 === 0) {
                    gameStatusDisplay.textContent = `⭐ 最高等級！得分：${gameState.score}`;
                    setTimeout(() => { gameStatusDisplay.textContent = ''; }, 2000);
                }

                gameState.food = generateFood();
                updateDisplay();
            } else {
                gameState.snake.pop();
            }

            updateDisplay();
        }

        function drawGame() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            gameState.snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = 'rgba(0, 255, 136, 0.5)';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#00cc66';
                    ctx.shadowColor = 'rgba(0, 204, 102, 0.3)';
                    ctx.shadowBlur = 5;
                }

                ctx.fillRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2
                );
            });

            ctx.shadowColor = 'transparent';

            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = 'rgba(255, 107, 107, 0.6)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                gameState.food.x * CELL_SIZE + CELL_SIZE / 2,
                gameState.food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowColor = 'transparent';
        }

        function updateDisplay() {
            scoreDisplay.textContent = gameState.score;
            levelDisplay.textContent = gameState.level;
            
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                highScoreDisplay.textContent = gameState.highScore;
                localStorage.setItem('snakeHighScore', gameState.highScore);
            }
        }

        function startGame() {
            if (gameState.isRunning && !gameState.isPaused) return;

            if (!gameState.isRunning) {
                resetGameState();
            }

            gameState.isRunning = true;
            gameState.isPaused = false;
            startBtn.textContent = '繼續';
            pauseBtn.textContent = '暫停';
            pauseBtn.disabled = false;
            gameStatusDisplay.textContent = '遊戲中...';

            gameLoop();
        }

        function pauseGame() {
            if (!gameState.isRunning) return;

            gameState.isPaused = !gameState.isPaused;
            pauseBtn.textContent = gameState.isPaused ? '繼續' : '暫停';
            gameStatusDisplay.textContent = gameState.isPaused ? '⏸️ 已暫停' : '遊戲中...';

            if (!gameState.isPaused) {
                gameLoop();
            }
        }

        function endGame() {
            gameState.isRunning = false;
            gameState.isPaused = false;
            playSound('gameOver');
            gameStatusDisplay.textContent = `💀 遊戲結束！最終分數：${gameState.score}`;
            startBtn.textContent = '開始遊戲';
            pauseBtn.textContent = '暫停';
            pauseBtn.disabled = true;
        }

        function resetGame() {
            gameState.isRunning = false;
            gameState.isPaused = false;
            resetGameState();
            startBtn.textContent = '開始遊戲';
            pauseBtn.textContent = '暫停';
            pauseBtn.disabled = true;
            gameStatusDisplay.textContent = '';
            drawGame();
            updateDisplay();
        }

        function resetGameState() {
            gameState.snake = [{ x: 10, y: 10 }];
            gameState.food = generateFood();
            gameState.direction = { x: 1, y: 0 };
            gameState.nextDirection = { x: 1, y: 0 };
            gameState.score = 0;
            gameState.level = 1;
            gameState.foodEaten = 0;
            gameState.gameSpeed = INITIAL_SPEED;
        }

        let lastUpdateTime = 0;

        function gameLoop() {
            drawGame();

            const currentTime = Date.now();
            if (currentTime - lastUpdateTime > gameState.gameSpeed) {
                updateGame();
                lastUpdateTime = currentTime;
            }

            if (gameState.isRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === 'arrowup' || key === 'w') {
                if (gameState.direction.y === 0) {
                    gameState.nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                }
            } else if (key === 'arrowdown' || key === 's') {
                if (gameState.direction.y === 0) {
                    gameState.nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                }
            } else if (key === 'arrowleft' || key === 'a') {
                if (gameState.direction.x === 0) {
                    gameState.nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                }
            } else if (key === 'arrowright' || key === 'd') {
                if (gameState.direction.x === 0) {
                    gameState.nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                }
            } else if (key === ' ') {
                if (gameState.isRunning) {
                    pauseGame();
                } else {
                    startGame();
                }
                e.preventDefault();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            const threshold = 30;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > threshold && gameState.direction.x === 0) {
                    gameState.nextDirection = { x: 1, y: 0 };
                } else if (deltaX < -threshold && gameState.direction.x === 0) {
                    gameState.nextDirection = { x: -1, y: 0 };
                }
            } else {
                if (deltaY > threshold && gameState.direction.y === 0) {
                    gameState.nextDirection = { x: 0, y: 1 };
                } else if (deltaY < -threshold && gameState.direction.y === 0) {
                    gameState.nextDirection = { x: 0, y: -1 };
                }
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => {
            if (gameState.direction.y === 0) {
                gameState.nextDirection = { x: 0, y: -1 };
            }
        });

        document.getElementById('btnDown').addEventListener('click', () => {
            if (gameState.direction.y === 0) {
                gameState.nextDirection = { x: 0, y: 1 };
            }
        });

        document.getElementById('btnLeft').addEventListener('click', () => {
            if (gameState.direction.x === 0) {
                gameState.nextDirection = { x: -1, y: 0 };
            }
        });

        document.getElementById('btnRight').addEventListener('click', () => {
            if (gameState.direction.x === 0) {
                gameState.nextDirection = { x: 1, y: 0 };
            }
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        resetBtn.addEventListener('click', resetGame);

        pauseBtn.disabled = true;

        drawGame();
        updateDisplay();
    </script>
</body>
</html>
