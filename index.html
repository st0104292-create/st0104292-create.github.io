<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 貪吃蛇遊戲</h1>
        </div>

        <div class="info-panel">
            <div class="score-box">
                <span class="label">分數：</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="highscore-box">
                <span class="label">最高分：</span>
                <span class="value" id="highscore">0</span>
            </div>
            <div class="level-box">
                <span class="label">等級：</span>
                <span class="value" id="level">1</span>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="control-panel">
            <div class="keyboard-hint">⌨️ 桌面：方向鍵操作</div>
            <div class="mobile-controls">
                <button class="btn-control btn-up" id="btnUp">▲</button>
                <div class="row">
                    <button class="btn-control btn-left" id="btnLeft">◄</button>
                    <button class="btn-control btn-down" id="btnDown">▼</button>
                    <button class="btn-control btn-right" id="btnRight">►</button>
                </div>
            </div>
            <div class="button-group">
                <button id="startBtn" class="btn btn-primary">開始遊戲</button>
                <button id="pauseBtn" class="btn btn-secondary">暫停</button>
                <button id="resetBtn" class="btn btn-danger">重新開始</button>
            </div>
            <div class="sound-control">
                <label>
                    <input type="checkbox" id="soundToggle" checked>
                    🔊 音效
                </label>
            </div>
        </div>

        <div class="game-status" id="gameStatus"></div>
    </div>

    <!-- 音效元素 -->
    <audio id="eatSound" preload="auto"></audio>
    <audio id="gameOverSound" preload="auto"></audio>
    <audio id="levelUpSound" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
