<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲選擇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="name-scroll">陳宗偉</div>
    <div class="container">
        <h1>🎮 遊戲中心</h1>
        <p class="intro">選擇您想要玩的遊戲</p>
        
        <div class="games-grid">
            <div class="game-card game-card-1">
                <div class="card-background"></div>
                <div class="card-content">
                    <div class="game-icon">🔨</div>
                    <h2>打地鼠遊戲</h2>
                    <p>快速反應遊戲，打擊出現的地鼠獲得分數！</p>
                    <a href="https://st0104292-create.github.io/1/" class="btn">進入遊戲</a>
                </div>
            </div>
            
            <div class="game-card game-card-2">
                <div class="card-background"></div>
                <div class="card-content">
                    <div class="game-icon">🐍</div>
                    <h2>貪吃蛇遊戲</h2>
                    <p>經典遊戲，控制蛇吃食物，成長但不要撞到自己！</p>
                    <a href="https://st0104292-create.github.io/2/" class="btn">進入遊戲</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
