<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            opacity: 0.8;
            display: block;
        }

        .info-value {
            font-size: 20px;
            display: block;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border-radius: 10px;
            margin-bottom: 20px;
            touch-action: none;
            cursor: crosshair;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            flex-grow: 1;
            max-width: 150px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #pauseBtn {
            background: #FF9500;
            color: white;
        }

        #pauseBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 149, 0, 0.4);
        }

        #pauseBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #soundToggle {
            background: #4CAF50;
            color: white;
            width: 50px;
            height: 50px;
            padding: 0;
            font-size: 20px;
        }

        #soundToggle:hover {
            background: #45a049;
            transform: scale(1.1);
        }

        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .difficulty-info {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .info-bar {
                margin-bottom: 15px;
            }

            .info-item {
                padding: 10px 15px;
                font-size: 14px;
                min-width: 100px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }

            #soundToggle {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔨 打地鼠遊戲 🔨</h1>
        
        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">時間</span>
                <span class="info-value" id="time">30</span>
            </div>
            <div class="info-item">
                <span class="info-label">難度</span>
                <span class="info-value" id="difficulty">1</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="button-group">
            <button id="startBtn">🎮 開始遊戲</button>
            <button id="pauseBtn" disabled>⏸ 暫停</button>
            <button id="soundToggle">🔊 聲音ON</button>
        </div>

        <div class="stats">
            <p id="gameStatus">準備好了嗎？點擊「開始遊戲」開始！</p>
            <div class="difficulty-info">
                越往後越快！💨
            </div>
        </div>
    </div>

    <script>
        // 遊戲配置
        const config = {
            canvasWidth: 600,
            canvasHeight: 400,
            moleRadius: 30,
            gameTime: 30,
            initialMoleShowTime: 1000,
            minMoleShowTime: 300
        };

        // 遊戲狀態
        let gameState = {
            score: 0,
            timeLeft: config.gameTime,
            isRunning: false,
            isPaused: false,
            difficulty: 1,
            soundEnabled: true,
            hits: 0,
            moles: []
        };

        // 獲取 DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const difficultyDisplay = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const soundToggle = document.getElementById('soundToggle');
        const gameStatus = document.getElementById('gameStatus');

        // 音頻上下文
        let audioContext = null;

        // 初始化畫布大小
        function resizeCanvas() {
            const containerWidth = canvas.parentElement.clientWidth;
            canvas.width = Math.min(containerWidth, config.canvasWidth);
            canvas.height = Math.min(canvas.width * 0.67, config.canvasHeight);
        }

        // 音頻初始化
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放成功聲音
        function playSuccessSound() {
            if (!gameState.soundEnabled || !audioContext) return;

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(800, now);
            osc.frequency.setValueAtTime(1000, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.setValueAtTime(0, now + 0.1);

            osc.start(now);
            osc.stop(now + 0.1);
        }

        // 播放遊戲結束聲音
        function playGameOverSound() {
            if (!gameState.soundEnabled || !audioContext) return;

            const now = audioContext.currentTime;
            const frequencies = [800, 600, 400];
            
            frequencies.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, now + index * 0.1);
                gain.gain.setValueAtTime(0, now + index * 0.1 + 0.15);

                osc.start(now + index * 0.1);
                osc.stop(now + index * 0.1 + 0.15);
            });
        }

        // 播放點擊聲音
        function playClickSound() {
            if (!gameState.soundEnabled || !audioContext) return;

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(600, now);
            osc.frequency.setValueAtTime(400, now + 0.05);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.setValueAtTime(0, now + 0.05);

            osc.start(now);
            osc.stop(now + 0.05);
        }

        // 創建地鼠
        class Mole {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = config.moleRadius;
                this.visible = true;
                this.hit = false;
                this.showTime = Math.max(
                    config.initialMoleShowTime - (gameState.difficulty - 1) * 100,
                    config.minMoleShowTime
                );
                this.startTime = Date.now();
            }

            update() {
                const elapsed = Date.now() - this.startTime;
                if (elapsed > this.showTime) {
                    this.visible = false;
                }
            }

            draw(ctx) {
                if (!this.visible || this.hit) return;

                // 身體
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // 邊框
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 3;
                ctx.stroke();

                // 左眼
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x - 10, this.y - 8, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x - 10, this.y - 8, 3, 0, Math.PI * 2);
                ctx.fill();

                // 右眼
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + 10, this.y - 8, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x + 10, this.y - 8, 3, 0, Math.PI * 2);
                ctx.fill();

                // 嘴巴
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y + 5, 8, 0, Math.PI);
                ctx.stroke();
            }

            isClicked(clickX, clickY) {
                const distance = Math.sqrt(
                    Math.pow(clickX - this.x, 2) + Math.pow(clickY - this.y, 2)
                );
                return distance < this.radius;
            }
        }

        // 繪製遊戲
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製所有地鼠
            gameState.moles.forEach(mole => {
                mole.draw(ctx);
            });

            // 繪製遊戲狀態文字
            if (!gameState.isRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(
                    gameState.isPaused ? '暫停中' : '準備開始',
                    canvas.width / 2,
                    canvas.height / 2
                );
            }
        }

        // 生成新的地鼠
        function spawnMole() {
            if (!gameState.isRunning || gameState.isPaused) return;

            const padding = config.moleRadius + 10;
            const x = Math.random() * (canvas.width - padding * 2) + padding;
            const y = Math.random() * (canvas.height - padding * 2) + padding;

            const mole = new Mole(x, y);
            gameState.moles.push(mole);

            // 計時移除隱形地鼠
            setTimeout(() => {
                gameState.moles = gameState.moles.filter(m => m !== mole || !m.hit);
            }, mole.showTime + 100);
        }

        // 更新遊戲
        function updateGame() {
            if (!gameState.isRunning) return;

            // 更新地鼠
            gameState.moles.forEach(mole => mole.update());

            // 移除不可見的未擊中地鼠並扣分
            gameState.moles.forEach(mole => {
                if (!mole.visible && !mole.hit) {
                    mole.hit = true; // 標記為已處理，避免重複扣分
                }
            });

            drawGame();
        }

        // 遊戲循環
        function gameLoop() {
            updateGame();
            requestAnimationFrame(gameLoop);
        }

        // 開始遊戲
        function startGame() {
            initAudio();
            gameState.score = 0;
            gameState.timeLeft = config.gameTime;
            gameState.isRunning = true;
            gameState.isPaused = false;
            gameState.difficulty = 1;
            gameState.hits = 0;
            gameState.moles = [];

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            gameStatus.textContent = '遊戲進行中...'

            // 生成地鼠的主循環
            const spawnInterval = setInterval(() => {
                if (!gameState.isRunning || gameState.isPaused) return;
                
                spawnMole();
                
                // 根據難度調整速度
                const newInterval = Math.max(800 - (gameState.difficulty - 1) * 100, 200);
                clearInterval(spawnInterval);
                startGame.spawnTimer = setInterval(arguments.callee, newInterval || 500);
            }, 800);

            startGame.spawnTimer = spawnInterval;

            // 倒計時
            const countdownInterval = setInterval(() => {
                gameState.timeLeft--;
                timeDisplay.textContent = gameState.timeLeft;
                difficultyDisplay.textContent = gameState.difficulty;

                // 動態提升難度
                gameState.difficulty = Math.floor(
                    1 + (config.gameTime - gameState.timeLeft) / 10
                );

                if (gameState.timeLeft <= 0) {
                    endGame();
                    clearInterval(countdownInterval);
                }
            }, 1000);

            startGame.countdownTimer = countdownInterval;
            gameLoop();
        }

        // 結束遊戲
        function endGame() {
            gameState.isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            playGameOverSound();
            
            gameStatus.textContent = `遊戲結束！最終得分：${gameState.score} 分！`;

            if (startGame.spawnTimer) clearInterval(startGame.spawnTimer);
            if (startGame.countdownTimer) clearInterval(startGame.countdownTimer);

            gameState.moles = [];
            drawGame();
        }

        // 暫停/繼續遊戲
        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            pauseBtn.textContent = gameState.isPaused ? '▶ 繼續' : '⏸ 暫停';
            gameStatus.textContent = gameState.isPaused ? '遊戲已暫停' : '遊戲進行中...';
            drawGame();
        }

        // 切換聲音
        function toggleSound() {
            gameState.soundEnabled = !gameState.soundEnabled;
            soundToggle.textContent = gameState.soundEnabled ? '🔊 聲音ON' : '🔇 聲音OFF';
            playClickSound();
        }

        // 滑鼠點擊事件
        function handleClick(e) {
            if (!gameState.isRunning || gameState.isPaused) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            for (let mole of gameState.moles) {
                if (mole.visible && !mole.hit && mole.isClicked(clickX, clickY)) {
                    mole.hit = true;
                    gameState.score += 10;
                    gameState.hits++;
                    scoreDisplay.textContent = gameState.score;
                    playSuccessSound();
                    break;
                }
            }
        }

        // 觸摸事件（手機支持）
        function handleTouch(e) {
            if (!gameState.isRunning || gameState.isPaused) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            for (let touch of e.touches) {
                const clickX = (touch.clientX - rect.left) * scaleX;
                const clickY = (touch.clientY - rect.top) * scaleY;

                for (let mole of gameState.moles) {
                    if (mole.visible && !mole.hit && mole.isClicked(clickX, clickY)) {
                        mole.hit = true;
                        gameState.score += 10;
                        gameState.hits++;
                        scoreDisplay.textContent = gameState.score;
                        playSuccessSound();
                        break;
                    }
                }
            }

            e.preventDefault();
        }

        // 事件監聽
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        soundToggle.addEventListener('click', toggleSound);
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleTouch);
        window.addEventListener('resize', resizeCanvas);

        // 初始化
        resizeCanvas();
        drawGame();
    </script>
</body>
</html>
